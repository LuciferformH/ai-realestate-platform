services:
  - type: web
    name: ai-realestate-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-realestate-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["https://*.vercel.app","http://localhost:5173"]'
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: /health
    autoDeploy: true
    rootDir: .

  - type: postgres
    name: ai-realestate-db
    plan: free
    databaseName: ai_realestate
    ipAllowList: []
