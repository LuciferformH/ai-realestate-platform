services:
  - type: web
    name: ai-realestate-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-realestate-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["https://ai-realestate-frontend-neon.vercel.app"]'
      - key: ENVIRONMENT
        value: production
    healthCheckPath: /health
    autoDeploy: true
